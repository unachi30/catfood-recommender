spring:
  datasource:
    url: jdbc:mysql://localhost:3306/catfood?useSSL=false&serverTimezone=Asia/Taipei
    username: root
    password: admin123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  jwt:
    secret: ${APP_JWT_SECRET:change-me-catfood-recommender-jwt-secret-key-32}
    expiration-ms: 86400000
  stock-sync:
    enabled: true
    cron: "0 0 3 * * *"
    request-delay-ms: 1500
    connect-timeout-seconds: 10
    read-timeout-seconds: 15

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
